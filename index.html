<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мое Первое Приложение</title>
  <!-- Подключаем SDK Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      /* Стилизация под текущую тему Telegram */
      background: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    button {
      background: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Привет, мир!</h1>
    <p>Это мое первое Mini App.</p>
    <button onclick="showAlert()">Нажми меня</button>
  </div>

  <script>
    // Инициализация приложения
    Telegram.WebApp.ready();

    function showAlert() {
      Telegram.WebApp.showAlert('Кнопка работает! Ура!');
    }

    // Пример, как получить данные пользователя
    const user = Telegram.WebApp.initDataUnsafe.user;
    if (user) {
      console.log(`Привет, ${user.first_name}!`);
    }
  </script>
</body>

</html>
